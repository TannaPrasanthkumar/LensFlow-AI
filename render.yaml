services:
  # Combined Backend (FastAPI, Celery worker, and Celery beat in one container)
  - type: web
    name: eye-oms-backend
    env: docker
    dockerfilePath: docker/Dockerfile.backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # Paste your existing database Connection String here in Render dashboard
      - key: REDIS_URL
        sync: false # Paste your existing Redis Connection String here in Render dashboard
      - key: JWT_SECRET
        generateValue: true

  # Frontend static web site (100% Free CDN)
  - type: web
    name: eye-oms-frontend-service
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://eye-oms-backend.onrender.com # Placeholder - edit this in dashboard after deployment
