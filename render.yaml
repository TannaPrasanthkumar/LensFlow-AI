databases:
  - name: eye-oms-db
    databaseName: eye_oms
    databaseUser: eye_admin
    plan: free
    ipAllowList: []

services:
  # Redis
  - type: redis
    name: eye-oms-redis
    plan: free
    ipAllowList: []

  # Backend FastAPI Web Service
  - type: web
    name: eye-oms-backend
    env: docker
    dockerfilePath: docker/Dockerfile.backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eye-oms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eye-oms-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Celery Worker
  - type: worker
    name: eye-oms-celery-worker
    env: docker
    dockerfilePath: docker/Dockerfile.backend
    dockerCommand: celery -A backend.app.celery_app.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eye-oms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eye-oms-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: eye-oms-backend
          envVarKey: JWT_SECRET

  # Celery Beat
  - type: worker
    name: eye-oms-celery-beat
    env: docker
    dockerfilePath: docker/Dockerfile.backend
    dockerCommand: celery -A backend.app.celery_app.celery_app beat --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eye-oms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eye-oms-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: eye-oms-backend
          envVarKey: JWT_SECRET

  # Frontend static web site
  - type: web
    name: eye-oms-frontend-service
    env: docker
    dockerfilePath: docker/Dockerfile.frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://eye-oms-backend.onrender.com # Placeholder - edit this in dashboard after deployment
