databases:
  - name: eye-oms-db
    databaseName: eye_oms
    plan: free
    ipAllowList: []

services:
  # Redis
  - type: redis
    name: eye-oms-redis
    plan: free
    ipAllowList: []

  # Combined Backend (FastAPI, Celery worker, and Celery beat in one container)
  - type: web
    name: eye-oms-backend
    env: docker
    dockerfilePath: docker/Dockerfile.backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eye-oms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eye-oms-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend static web site (100% Free CDN)
  - type: web
    name: eye-oms-frontend-service
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://eye-oms-backend.onrender.com # Placeholder - edit this in dashboard after deployment
