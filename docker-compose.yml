version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: eye_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eye_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: eye_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super-secret-eye-key-12345
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: eye_celery_worker
    restart: always
    command: celery -A backend.app.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super-secret-eye-key-12345
    depends_on:
      - redis
      - postgres

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: eye_celery_beat
    restart: always
    command: celery -A backend.app.celery_app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super-secret-eye-key-12345
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: eye_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
